name: lego_epaper_controller
description: "LEGO-style Flutter App for controlling Arduino E-Paper display"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # HTTP Client
  dio: ^5.7.0
  
  # mDNS Discovery (Native Android NSD + iOS Bonjour)
  nsd: ^4.1.0
  
  # Image Picker (Camera/Gallery)
  image_picker: ^1.1.2
  
  # Google Fonts for LEGO-style typography
  google_fonts: ^6.2.1
  
  # Image Processing
  image: ^4.5.3
  
  # Path utilities
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/icon/
