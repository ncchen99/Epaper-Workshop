name: lego_epaper_controller
description: "LEGO-style Flutter App for controlling Arduino E-Paper display"
publish_to: 'none'
version: 0.1.1+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # HTTP Client
  dio: ^5.7.0
  
  # MQTT Client
  mqtt_client: ^10.6.0

  # mDNS discovery / .local hostname resolution
  multicast_dns: ^0.3.3
  
  # Local Storage
  shared_preferences: ^2.3.0
  
  # UUID Generation (for MQTT Client ID)
  uuid: ^4.5.1
  
  # Image Picker (Camera/Gallery)
  image_picker: ^1.1.2
  
  # Google Fonts for LEGO-style typography
  google_fonts: ^6.2.1
  
  # Image Processing
  image: ^4.5.3
  
  # Path utilities
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/icon/icon.png"
  adaptive_icon_background: "#EADCDC"
  adaptive_icon_foreground: "assets/images/icon/foreground.png"


  web:
    generate: true
    image_path: "assets/images/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/images/icon/icon.png"
  macos:
    generate: true
    image_path: "assets/images/icon/icon.png"
  linux:
    generate: true
    image_path: "assets/images/icon/icon.png"


flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/icon/
