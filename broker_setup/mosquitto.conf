# ==============================================
# Mosquitto MQTT Broker - 設定檔
# E-Paper Workshop (Phase 1: Local LAN Demo)
# ==============================================

# ---- 基本設定 ----
# 監聽所有網路介面上的 Port 1883
listener 1883 0.0.0.0
protocol mqtt

# ---- WebSocket 設定 (暫時註解，避免不支援 ws 的版本報錯) ----
# listener 9001 0.0.0.0
# protocol ws

# 允許匿名連線（Demo 階段不需帳號密碼）
allow_anonymous true

# ---- 日誌設定 ----
# 日誌輸出到標準輸出（終端機可直接看到）
log_dest stdout

# 日誌等級
log_type all

# 顯示連線/斷線事件
connection_messages true

# 顯示 subscribe/unsubscribe 事件
log_type subscribe
log_type unsubscribe

# ---- 效能設定 ----
# 最大封包大小 (bytes)，設為 1MB 以容納較大的 JSON payload
max_packet_size 1048576

# 最大連線數
max_connections -1

# ---- 持久化設定 ----
# 關閉持久化（Demo 階段不需要）
persistence false
